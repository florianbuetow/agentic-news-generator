# Test configuration — all agents mocked, no LLM required.
# Output goes to ./data/test/output/

paths:
  data_dir: ./data/test
  data_models_dir: ./data/test/models
  data_downloads_dir: ./data/test/downloads
  data_downloads_videos_dir: ./data/test/downloads/videos
  data_downloads_transcripts_dir: ./data/test/downloads/transcripts
  data_downloads_transcripts_hallucinations_dir: ./data/test/downloads/transcripts-hallucinations
  data_downloads_transcripts_cleaned_dir: ./data/test/downloads/transcripts_cleaned
  data_transcripts_topics_dir: ./data/test/downloads/transcripts-topics
  data_downloads_audio_dir: ./data/test/downloads/audio
  data_downloads_metadata_dir: ./data/test/downloads/metadata
  data_output_dir: ./data/test/output
  data_input_dir: ./data/test/input
  data_temp_dir: ./data/test/temp
  data_archive_dir: ./data/test/archive
  data_archive_videos_dir: ./data/test/archive/videos
  data_logs_dir: ./data/test/logs
  data_output_articles_dir: ./data/test/output/articles
  data_articles_input_dir: ./data/test/articles/input
  reports_dir: ./data/test/reports
  data_article_generation_output_dir: ./data/test/output/articles
  data_article_generation_artifacts_dir: ./data/test/output/article_editor_runs
  data_article_generation_kb_dir: ./data/test/knowledgebase
  data_article_generation_kb_index_dir: ./data/test/knowledgebase_index
  data_article_generation_institutional_memory_dir: ./data/test/institutional_memory
  data_article_generation_prompts_dir: ./prompts/article_editor
  data_topic_detection_output_dir: ./data/test/output/topics
  data_topic_detection_taxonomies_dir: ./data/test/input/taxonomies
  data_topic_detection_taxonomy_cache_dir: ./data/test/input/taxonomies/cache
  data_hallucination_detection_output_dir: ./data/test/downloads/transcripts-hallucinations
  data_article_compiler_input_dir: ./data/test/input/newspaper/articles
  data_article_compiler_output_file: ./data/test/input/newspaper/articles.js

channels: []

defaults:
  encoding_name: "o200k_base"
  repetition_min_k: 1
  repetition_min_repetitions: 5
  detect_min_k: 3

article_generation:
  editor:
    editor_max_rounds: 1
    output:
      final_articles_dir: ./data/test/output/articles
      run_artifacts_dir: ./data/test/output/article_editor_runs
    prompts:
      root_dir: ./prompts/article_editor
      writer_prompt_file: writer.md
      revision_prompt_file: revision.md
      article_review_prompt_file: article_review.md
      concern_mapping_prompt_file: concern_mapping.md
      specialists_dir: specialists
      fact_check_prompt_file: fact_check.md
      evidence_finding_prompt_file: evidence_finding.md
      opinion_prompt_file: opinion.md
      attribution_prompt_file: attribution.md
      style_review_prompt_file: style_review.md

  agents:
    writer:
      agent_name: default
      llm:
        model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
        api_base: http://127.0.0.1:1234/v1
        api_key: lm-studio
        context_window: 262144
        max_tokens: 32768
        temperature: 0.7
        context_window_threshold: 90
        max_retries: 0
        retry_delay: 2.0
        timeout_seconds: 300

    article_review:
      agent_name: mock
      llm:
        model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
        api_base: http://127.0.0.1:1234/v1
        api_key: lm-studio
        context_window: 262144
        max_tokens: 2048
        temperature: 0.3
        context_window_threshold: 90
        max_retries: 0
        retry_delay: 2.0
        timeout_seconds: 300

    concern_mapping:
      agent_name: mock
      llm:
        model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
        api_base: http://127.0.0.1:1234/v1
        api_key: lm-studio
        context_window: 262144
        max_tokens: 2048
        temperature: 0.3
        context_window_threshold: 90
        max_retries: 0
        retry_delay: 2.0
        timeout_seconds: 300

    specialists:
      fact_check:
        agent_name: mock
        llm:
          model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
          api_base: http://127.0.0.1:1234/v1
          api_key: lm-studio
          context_window: 262144
          max_tokens: 2048
          temperature: 0.2
          context_window_threshold: 90
          max_retries: 0
          retry_delay: 2.0
          timeout_seconds: 300

      evidence_finding:
        agent_name: mock
        llm:
          model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
          api_base: http://127.0.0.1:1234/v1
          api_key: lm-studio
          context_window: 262144
          max_tokens: 2048
          temperature: 0.2
          context_window_threshold: 90
          max_retries: 0
          retry_delay: 2.0
          timeout_seconds: 300

      opinion:
        agent_name: mock
        llm:
          model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
          api_base: http://127.0.0.1:1234/v1
          api_key: lm-studio
          context_window: 262144
          max_tokens: 2048
          temperature: 0.3
          context_window_threshold: 90
          max_retries: 0
          retry_delay: 2.0
          timeout_seconds: 300

      attribution:
        agent_name: mock
        llm:
          model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
          api_base: http://127.0.0.1:1234/v1
          api_key: lm-studio
          context_window: 262144
          max_tokens: 2048
          temperature: 0.2
          context_window_threshold: 90
          max_retries: 0
          retry_delay: 2.0
          timeout_seconds: 300

      style_review:
        agent_name: mock
        llm:
          model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
          api_base: http://127.0.0.1:1234/v1
          api_key: lm-studio
          context_window: 262144
          max_tokens: 2048
          temperature: 0.3
          context_window_threshold: 90
          max_retries: 0
          retry_delay: 2.0
          timeout_seconds: 300

  knowledge_base:
    data_dir: ./data/test/knowledgebase
    index_dir: ./data/test/knowledgebase_index
    chunk_size_tokens: 512
    chunk_overlap_tokens: 50
    timeout_seconds: 30
    embedding:
      provider: lmstudio
      model_name: text-embedding-bge-large-en-v1.5
      api_base: http://127.0.0.1:1234/v1
      api_key: lm-studio
      timeout_seconds: 30

  perplexity:
    api_base: https://api.perplexity.ai
    api_key: not-used-in-test
    model: sonar
    timeout_seconds: 45

  institutional_memory:
    data_dir: ./data/test/institutional_memory
    fact_checking_subdir: fact_checking
    evidence_finding_subdir: evidence_finding

  allowed_styles:
    - "NATURE_NEWS"
    - "SCIAM_MAGAZINE"

  default_style_mode: "SCIAM_MAGAZINE"
