# Topic Segmentation Agent Configuration
topic_segmentation:
  # Segmentation Agent LLM - using LM Studio
  agent_llm:
    model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
    api_base: http://127.0.0.1:1234/v1
    api_key: lm-studio
    context_window: 262144
    max_tokens: 262144
    temperature: 0.7
    context_window_threshold: 90  # Raise error if token usage exceeds 90% of context window
    max_retries: 3
    retry_delay: 2.0
    timeout_seconds: 120

  # Critic Agent LLM - using same LM Studio instance
  critic_llm:
    model: openai/qwen3-30b-a3b-thinking-2507-mlx@8bit
    api_base: http://127.0.0.1:1234/v1
    api_key: lm-studio
    context_window: 262144
    max_tokens: 262144
    temperature: 0.3
    context_window_threshold: 90  # Raise error if token usage exceeds 90% of context window
    max_retries: 3
    retry_delay: 2.0
    timeout_seconds: 120

  # Retry configuration
  retry_limit: 3

